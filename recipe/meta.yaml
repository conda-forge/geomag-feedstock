{% set name = "geomag" %}
{% set version = "0.9.2015" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/geomag-{{ version }}.zip
  sha256: fa3f7544beca2dd706c3078d9d58cb35734d00de2591270a335216bb8ba310d5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - geomag
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/cmweiss/geomag
  summary: Magnetic variation/declination
  license: LGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ReimarBauer
